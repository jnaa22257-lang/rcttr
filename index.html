<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Management System</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#f1f5f9;
}

/* HEADER */

.header{
    width:100%;
    background:#2563eb;
    color:white;
    padding:20px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}

/* MAIN */

.container{
    width:95%;
    margin:auto;
    margin-top:20px;
}

/* CARDS */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
    margin-bottom:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card h2{
    color:#2563eb;
    margin-bottom:10px;
}

/* FORM */

.form-box{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

.form-box h2{
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    background:#2563eb;
    color:white;
    border:none;
    padding:12px 20px;
    margin-top:15px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#1d4ed8;
}

/* TABLE */

.table-box{
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table th{
    background:#2563eb;
    color:white;
    padding:12px;
}

table td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

.delete-btn{
    background:red;
    padding:8px 12px;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

.edit-btn{
    background:orange;
    padding:8px 12px;
    border:none;
    color:white;
    border-radius:6px;
    cursor:pointer;
}

/* SEARCH */

.search-box{
    margin-bottom:15px;
}

/* DARK MODE */

.dark{
    background:#111827;
    color:white;
}

.dark .card,
.dark .form-box,
.dark .table-box{
    background:#1f2937;
    color:white;
}

.dark table td{
    border-color:#374151;
}

.dark input,
.dark select{
    background:#111827;
    color:white;
    border:1px solid #374151;
}

/* RESPONSIVE */

@media(max-width:768px){

    table{
        font-size:12px;
    }

    .header{
        font-size:22px;
    }

}

</style>

</head>
<body>

<div class="header">
    School Management System
</div>

<div class="container">

    <!-- DASHBOARD -->

    <div class="cards">

        <div class="card">
            <h2>Total Students</h2>
            <p id="totalStudents">0</p>
        </div>

        <div class="card">
            <h2>Total Teachers</h2>
            <p>12</p>
        </div>

        <div class="card">
            <h2>Total Classes</h2>
            <p>8</p>
        </div>

        <div class="card">
            <h2>Attendance</h2>
            <p>95%</p>
        </div>

    </div>

    <!-- DARK MODE -->

    <button onclick="toggleDarkMode()">Toggle Dark Mode</button>

    <!-- ADD STUDENT -->

    <div class="form-box">

        <h2>Add Student</h2>

        <input type="text" id="studentId" placeholder="Student ID">

        <input type="text" id="studentName" placeholder="Student Name">

        <select id="studentGender">
            <option>Male</option>
            <option>Female</option>
        </select>

        <input type="email" id="studentEmail" placeholder="Email">

        <input type="text" id="studentPhone" placeholder="Phone">

        <input type="text" id="studentClass" placeholder="Class">

        <button onclick="addStudent()">Add Student</button>

    </div>

    <!-- SEARCH -->

    <div class="search-box">

        <input type="text" id="searchInput" placeholder="Search Student..." onkeyup="searchStudent()">

    </div>

    <!-- STUDENT TABLE -->

    <div class="table-box">

        <h2>Student List</h2>

        <table id="studentTable">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Student ID</th>
                    <th>Name</th>
                    <th>Gender</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Class</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="studentBody">

            </tbody>

        </table>

    </div>

</div>

<script>

/* STORAGE */

let students = JSON.parse(localStorage.getItem("students")) || [];

/* DISPLAY */

function displayStudents(){

    let table = document.getElementById("studentBody");

    table.innerHTML = "";

    students.forEach((student,index)=>{

        table.innerHTML += `
        
        <tr>

            <td>${index + 1}</td>
            <td>${student.studentId}</td>
            <td>${student.name}</td>
            <td>${student.gender}</td>
            <td>${student.email}</td>
            <td>${student.phone}</td>
            <td>${student.className}</td>

            <td>

                <button class="edit-btn" onclick="editStudent(${index})">
                    Edit
                </button>

                <button class="delete-btn" onclick="deleteStudent(${index})">
                    Delete
                </button>

            </td>

        </tr>

        `;

    });

    document.getElementById("totalStudents").innerText = students.length;

    localStorage.setItem("students",JSON.stringify(students));

}

/* ADD */

function addStudent(){

    let student = {

        studentId: document.getElementById("studentId").value,
        name: document.getElementById("studentName").value,
        gender: document.getElementById("studentGender").value,
        email: document.getElementById("studentEmail").value,
        phone: document.getElementById("studentPhone").value,
        className: document.getElementById("studentClass").value

    };

    students.push(student);

    displayStudents();

    clearForm();

}

/* CLEAR */

function clearForm(){

    document.getElementById("studentId").value = "";
    document.getElementById("studentName").value = "";
    document.getElementById("studentEmail").value = "";
    document.getElementById("studentPhone").value = "";
    document.getElementById("studentClass").value = "";

}

/* DELETE */

function deleteStudent(index){

    students.splice(index,1);

    displayStudents();

}

/* EDIT */

function editStudent(index){

    let student = students[index];

    document.getElementById("studentId").value = student.studentId;
    document.getElementById("studentName").value = student.name;
    document.getElementById("studentGender").value = student.gender;
    document.getElementById("studentEmail").value = student.email;
    document.getElementById("studentPhone").value = student.phone;
    document.getElementById("studentClass").value = student.className;

    students.splice(index,1);

    displayStudents();

}

/* SEARCH */

function searchStudent(){

    let input = document.getElementById("searchInput").value.toLowerCase();

    let rows = document.querySelectorAll("#studentBody tr");

    rows.forEach(row=>{

        let text = row.innerText.toLowerCase();

        row.style.display = text.includes(input) ? "" : "none";

    });

}

/* DARK MODE */

function toggleDarkMode(){

    document.body.classList.toggle("dark");

}

/* INITIAL LOAD */

displayStudents();

</script>

</body>
</html>
